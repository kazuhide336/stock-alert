name: 天井サインチェック

on:
  schedule:
    - cron: '0,30 14-21 * * 1-5'
    - cron: '0,30 0-7 * * 1-5'
  workflow_dispatch:

jobs:
  ceiling-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 天井チェック実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python ceiling_alert_v2.py
